version: "3.9"

services:
  symfony:
    build:
      context: ./backend
    container_name: symfony
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: symfony-nginx
    ports:
      - "8000:80"   # Accede a Symfony desde tu navegador
    volumes:
      - ./backend:/var/www
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - symfony
    networks:
      - app-network

  react:
    build:
      context: ./frontend
    container_name: react
    ports:
      - "3000:80"   # Accede a React desde tu navegador
    networks:
      - app-network
    environment:
      - REACT_APP_API_URL=http://nginx:80  # React apunta a Symfony

networks:
  app-network:
    driver: bridge